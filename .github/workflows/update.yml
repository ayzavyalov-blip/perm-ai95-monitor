name: Update AI-95 data

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Network diagnostics before DNS fix
        continue-on-error: true
        run: |
          echo "=== resolv.conf ==="
          cat /etc/resolv.conf || true

          echo "=== DNS diagnostics ==="
          getent hosts gdebenz.ru || true
          getent hosts www.gdebenz.ru || true
          getent hosts yandex.ru || true
          getent hosts 2gis.ru || true

          echo "=== HTTP diagnostics ==="
          curl -I -L --max-time 20 https://gdebenz.ru/perm || true
          curl -I -L --max-time 20 https://gdebenz.ru/fuel/ai-95 || true
          curl -I -L --max-time 20 https://gdebenz.ru/ || true
          curl -I -L --max-time 20 https://yandex.ru/maps/50/perm/probki/ || true
          curl -I -L --max-time 20 "https://2gis.ru/perm?traffic" || true

      - name: Try to fix gdebenz DNS through public resolvers
        continue-on-error: true
        run: |
          sudo apt-get update -y
          sudo apt-get install -y dnsutils

          echo "=== dig through public resolvers ==="
          dig +short A gdebenz.ru @1.1.1.1 || true
          dig +short A gdebenz.ru @8.8.8.8 || true
          dig +short A www.gdebenz.ru @1.1.1.1 || true
          dig +short A www.gdebenz.ru @8.8.8.8 || true

          GDEBENZ_IP="$(dig +short A gdebenz.ru @1.1.1.1 | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)"
          if [ -z "$GDEBENZ_IP" ]; then
            GDEBENZ_IP="$(dig +short A gdebenz.ru @8.8.8.8 | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)"
          fi

          if [ -n "$GDEBENZ_IP" ]; then
            echo "Found gdebenz.ru IP: $GDEBENZ_IP"
            echo "$GDEBENZ_IP gdebenz.ru www.gdebenz.ru" | sudo tee -a /etc/hosts
          else
            echo "Could not resolve gdebenz.ru through public resolvers."
          fi

          echo "=== hosts after DNS fix ==="
          getent hosts gdebenz.ru || true
          getent hosts www.gdebenz.ru || true

          echo "=== HTTP after DNS fix ==="
          curl -I -L --max-time 20 https://gdebenz.ru/perm || true
          curl -I -L --max-time 20 https://gdebenz.ru/fuel/ai-95 || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect fuel data
        run: |
          python scripts/collect.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Make traffic screenshots
        continue-on-error: true
        run: |
          mkdir -p screenshots
          npx playwright test

      - name: Commit updated data and screenshots
        run: |
          git config user.name "ai95-monitor-bot"
          git config user.email "ai95-monitor-bot@users.noreply.github.com"
          git add data/latest.json data/history/ screenshots/
          git diff --cached --quiet && echo "No data changes" || git commit -m "Update AI-95 data and traffic screenshots"
          git push
