name: Update AI-95 data

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Network diagnostics
        continue-on-error: true
        run: |
          echo "=== DNS diagnostics ==="
          getent hosts gdebenz.ru || true
          getent hosts toplivo.tbank.ru || true
          getent hosts yandex.ru || true
          getent hosts 2gis.ru || true

          echo "=== HTTP diagnostics ==="
          curl -I -L --max-time 20 https://gdebenz.ru/perm || true
          curl -I -L --max-time 20 https://toplivo.tbank.ru/ || true
          curl -I -L --max-time 20 "https://yandex.ru/maps/50/perm/?l=map%2Ctrf" || true
          curl -I -L --max-time 20 "https://2gis.ru/perm?traffic" || true

      - name: Try to fix gdebenz DNS
        continue-on-error: true
        run: |
          sudo apt-get update -y
          sudo apt-get install -y dnsutils

          GDEBENZ_IP="$(dig +short A gdebenz.ru @1.1.1.1 | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)"
          if [ -z "$GDEBENZ_IP" ]; then
            GDEBENZ_IP="$(dig +short A gdebenz.ru @8.8.8.8 | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)"
          fi
          if [ -z "$GDEBENZ_IP" ]; then
            GDEBENZ_IP="80.87.196.21"
          fi

          echo "Using gdebenz.ru IP: $GDEBENZ_IP"
          echo "$GDEBENZ_IP gdebenz.ru www.gdebenz.ru" | sudo tee -a /etc/hosts
          getent hosts gdebenz.ru || true
          curl -I -L --max-time 20 https://gdebenz.ru/perm || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Collect TBank public fuel signals
        run: |
          mkdir -p data screenshots
          node scripts/collect-tbank-public.js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Merge gdebenz and TBank signals
        run: |
          python scripts/collect.py

      - name: Make station traffic screenshots
        run: |
          mkdir -p screenshots
          node scripts/make-traffic-screenshots.js

      - name: Commit updated data and screenshots
        run: |
          git config user.name "ai95-monitor-bot"
          git config user.email "ai95-monitor-bot@users.noreply.github.com"
          git add data/latest.json data/history/ data/tbank_observations.json data/tbank_public_status.json screenshots/
          git diff --cached --quiet && echo "No data changes" || git commit -m "Update AI-95 precise candidates and traffic screenshots"
          git push
